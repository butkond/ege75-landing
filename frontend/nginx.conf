limit_req_zone $binary_remote_addr zone=api:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

upstream backend {
    server backend:8000;
    keepalive 16;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name xn--75-6kcaj2bxg.xn--p1ai www.xn--75-6kcaj2bxg.xn--p1ai;

    location / {
        return 301 https://xn--75-6kcaj2bxg.xn--p1ai$request_uri;
    }
}

# www → без www
server {
    listen 443 ssl;
    http2 on;
    server_name www.xn--75-6kcaj2bxg.xn--p1ai;

    ssl_certificate     /etc/ssl/custom/certificate.crt;
    ssl_certificate_key /etc/ssl/custom/private.key;

    return 301 https://xn--75-6kcaj2bxg.xn--p1ai$request_uri;
}

# Основной сервер
server {
    listen 443 ssl default_server;
    http2 on;
    server_name xn--75-6kcaj2bxg.xn--p1ai;

    ssl_certificate     /etc/ssl/custom/certificate.crt;
    ssl_certificate_key /etc/ssl/custom/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /api/ {
        limit_req zone=api burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}